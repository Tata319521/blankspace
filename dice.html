<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-secondary: #16213e;
            --text-main: #eaeaea;
            --accent: #0f3460;
            --success: #4ecca3;
            --fail: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.8;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .dice-wrapper {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
        }

        /* 3D容器核心修复 */
        .dice-container {
            perspective: 800px;
            -webkit-perspective: 800px;
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
            transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
        }

        .dice.rolling {
            animation: rollDice 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 骰子面样式修复：隔离backdrop-filter */
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            /* 显式开启硬件加速 */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: visible;
            -webkit-backface-visibility: visible;
        }

        /* 隔离模糊层到伪元素，避免破坏3D上下文 */
        .dice-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
            pointer-events: none;
        }

        /* 骰子6个面的3D位置 */
        .face-1 { transform: rotateX(0deg) rotateY(0deg) translateZ(60px); }
        .face-2 { transform: rotateX(0deg) rotateY(90deg) translateZ(60px); }
        .face-3 { transform: rotateX(90deg) rotateY(0deg) translateZ(60px); }
        .face-4 { transform: rotateX(-90deg) rotateY(0deg) translateZ(60px); }
        .face-5 { transform: rotateX(0deg) rotateY(-90deg) translateZ(60px); }
        .face-6 { transform: rotateX(180deg) rotateY(0deg) translateZ(60px); }

        @keyframes rollDice {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            25% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            50% { transform: rotateX(1080deg) rotateY(720deg) rotateZ(360deg); }
            75% { transform: rotateX(1440deg) rotateY(1080deg) rotateZ(540deg); }
            100% { transform: rotateX(1800deg) rotateY(1440deg) rotateZ(720deg); }
        }

        .roll-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #1a4a7a 100%);
            border: none;
            color: var(--text-main);
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.4);
        }

        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 52, 96, 0.6);
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .current-score {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.8;
        }

        .result-text {
            margin-top: 20px;
            font-size: 48px;
            font-weight: 800;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-text.success {
            color: var(--success);
            opacity: 1;
            transform: scale(1);
        }

        .result-text.fail {
            color: var(--fail);
            opacity: 1;
            transform: scale(1);
        }

        /* 移动端适配优化 */
        @media (max-width: 640px) {
            .game-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .dice-container {
                width: 100px;
                height: 100px;
                perspective: 600px;
                -webkit-perspective: 600px;
            }

            .face-1 { transform: rotateX(0deg) rotateY(0deg) translateZ(50px); }
            .face-2 { transform: rotateX(0deg) rotateY(90deg) translateZ(50px); }
            .face-3 { transform: rotateX(90deg) rotateY(0deg) translateZ(50px); }
            .face-4 { transform: rotateX(-90deg) rotateY(0deg) translateZ(50px); }
            .face-5 { transform: rotateX(0deg) rotateY(-90deg) translateZ(50px); }
            .face-6 { transform: rotateX(180deg) rotateY(0deg) translateZ(50px); }

            .result-text {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎲 3D 幸运骰子</h1>
        
        <div class="input-group">
            <label for="totalPoints">总点数（1-6）：</label>
            <input type="number" id="totalPoints" value="6" min="1" max="6">
        </div>
        
        <div class="input-group">
            <label for="winPoints">胜利点数（0-5）：</label>
            <input type="number" id="winPoints" value="3" min="0" max="5">
        </div>

        <div class="dice-wrapper">
            <div class="dice-container">
                <div class="dice" id="dice">
                    <div class="dice-face face-1">1</div>
                    <div class="dice-face face-2">2</div>
                    <div class="dice-face face-3">3</div>
                    <div class="dice-face face-4">4</div>
                    <div class="dice-face face-5">5</div>
                    <div class="dice-face face-6">6</div>
                </div>
            </div>
        </div>

        <button class="roll-btn" id="rollBtn">开始投掷</button>
        <div class="current-score" id="currentScore">当前点数：-</div>
        <div class="result-text" id="resultText"></div>
    </div>

    <script>
        const dice = document.getElementById("dice");
        const rollBtn = document.getElementById("rollBtn");
        const totalPointsInput = document.getElementById("totalPoints");
        const winPointsInput = document.getElementById("winPoints");
        const currentScore = document.getElementById("currentScore");
        const resultText = document.getElementById("resultText");

        // 初始化骰子显示面
        setDiceFace(1);

        rollBtn.addEventListener("click", () => {
            // 验证输入
            const totalPoints = parseInt(totalPointsInput.value);
            const winPoints = parseInt(winPointsInput.value);
            if (isNaN(totalPoints) || totalPoints < 1 || totalPoints > 6) {
                alert("请输入1-6之间的总点数");
                return;
            }
            if (isNaN(winPoints) || winPoints < 0 || winPoints > 5) {
                alert("请输入0-5之间的胜利点数");
                return;
            }

            // 重置状态
            dice.classList.add("rolling");
            resultText.className = "result-text";
            resultText.textContent = "";
            
            // 执行投掷逻辑
            setTimeout(() => {
                const randomPoint = Math.floor(Math.random() * totalPoints) + 1;
                setDiceFace(randomPoint);
                dice.classList.remove("rolling");
                currentScore.textContent = `当前点数：${randomPoint}`;

                // 判断胜负
                if (randomPoint > winPoints) {
                    resultText.textContent = "SUCCESS";
                    resultText.className = "result-text success";
                } else {
                    resultText.textContent = "FAIL";
                    resultText.className = "result-text fail";
                }
            }, 1500);
        });

        // 设置骰子显示面（增加随机Z轴旋转增强3D感）
        function setDiceFace(point) {
            const randomZ = Math.floor(Math.random() * 10) - 5; 
            switch(point) {
                case 1:
                    dice.style.transform = `rotateX(0deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 2:
                    dice.style.transform = `rotateX(0deg) rotateY(-90deg) rotateZ(${randomZ}deg)`;
                    break;
                case 3:
                    dice.style.transform = `rotateX(-90deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 4:
                    dice.style.transform = `rotateX(90deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 5:
                    dice.style.transform = `rotateX(0deg) rotateY(90deg) rotateZ(${randomZ}deg)`;
                    break;
                case 6:
                    dice.style.transform = `rotateX(180deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
            }
        }
    </script>
</body>
</html>
