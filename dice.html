<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子</title>
    <style>
        /* ==================== 复用原index.html的CSS变量 ==================== */
        :root {
            --bg-1: #050608;
            --bg-2: #0d1016;
            --bg-3: #151922;
            --text-main: #f3f4f6;
            --text-soft: rgba(255, 255, 255, 0.72);
            --text-faint: rgba(255, 255, 255, 0.48);
            --line: rgba(255, 255, 255, 0.08);
            --card: rgba(255, 255, 255, 0.06);
            --card-strong: rgba(255, 255, 255, 0.09);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --accent: #d1d5db;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            /* 复用login-body的背景渐变 */
            background:
                radial-gradient(circle at 20% 10%, rgba(255,255,255,0.08), transparent 18%),
                radial-gradient(circle at 85% 18%, rgba(255,255,255,0.05), transparent 12%),
                linear-gradient(180deg, #14181f 0%, #0c0e12 42%, #040506 100%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* ==================== 骰子专属样式（适配原风格） ==================== */
        .game-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 骰子卡片容器 - 复用login-card的毛玻璃效果 */
        .dice-card {
            position: relative;
            z-index: 2;
            background: var(--card);
            border: 1px solid var(--line);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: 32px 28px;
            width: 100%;
            text-align: center;
        }

        .card-glow {
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 30%, transparent 70%, rgba(255,255,255,0.05));
            pointer-events: none;
        }

        .dice-card h2 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .tip {
            color: var(--text-faint);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: var(--text-soft);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.28);
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            outline: none;
            font-size: 14px;
            transition: 0.25s ease;
        }

        .input-group input:focus {
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
        }

        .dice-wrapper {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
        }

        /* 3D骰子容器 - 修复移动端渲染 */
        .dice-container {
            perspective: 800px;
            -webkit-perspective: 800px;
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
            transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
        }

        .dice.rolling {
            animation: rollDice 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 骰子面 - 适配原风格的低透+毛玻璃（隔离模糊层） */
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid var(--line); /* 复用原边框变量 */
            border-radius: var(--radius-lg); /* 复用原圆角变量 */
            background: rgba(0, 0, 0, 0.28); /* 匹配原input背景 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main); /* 复用原文字主色 */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: visible;
            -webkit-backface-visibility: visible;
        }

        /* 隔离模糊层到伪元素，避免破坏3D上下文 */
        .dice-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-lg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
            pointer-events: none;
        }

        /* 骰子6个面的3D位置 */
        .face-1 { transform: rotateX(0deg) rotateY(0deg) translateZ(60px); }
        .face-2 { transform: rotateX(0deg) rotateY(90deg) translateZ(60px); }
        .face-3 { transform: rotateX(90deg) rotateY(0deg) translateZ(60px); }
        .face-4 { transform: rotateX(-90deg) rotateY(0deg) translateZ(60px); }
        .face-5 { transform: rotateX(0deg) rotateY(-90deg) translateZ(60px); }
        .face-6 { transform: rotateX(180deg) rotateY(0deg) translateZ(60px); }

        @keyframes rollDice {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            25% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            50% { transform: rotateX(1080deg) rotateY(720deg) rotateZ(360deg); }
            75% { transform: rotateX(1440deg) rotateY(1080deg) rotateZ(540deg); }
            100% { transform: rotateX(1800deg) rotateY(1440deg) rotateZ(720deg); }
        }

        /* 按钮 - 复用原main-btn风格 */
        .main-btn {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            background: linear-gradient(180deg, #f3f4f6 0%, #d1d5db 100%);
            color: #111827;
            font-size: 15px;
            font-weight: 700;
            margin-top: 4px;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .main-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .current-score {
            margin-top: 20px;
            font-size: 18px;
            color: var(--text-soft);
        }

        .result-text {
            margin-top: 20px;
            font-size: 48px;
            font-weight: 800;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-text.success {
            color: var(--accent); /* 复用原accent色 */
            opacity: 1;
            transform: scale(1);
        }

        .result-text.fail {
            color: #ff6b6b;
            opacity: 1;
            transform: scale(1);
        }

        /* 移动端适配 - 复用原响应式逻辑 */
        @media (max-width: 640px) {
            .dice-card {
                border-radius: 22px;
                padding: 28px 20px;
            }

            .dice-card h2 {
                font-size: 24px;
            }

            .dice-container {
                width: 100px;
                height: 100px;
                perspective: 600px;
                -webkit-perspective: 600px;
            }

            .face-1 { transform: rotateX(0deg) rotateY(0deg) translateZ(50px); }
            .face-2 { transform: rotateX(0deg) rotateY(90deg) translateZ(50px); }
            .face-3 { transform: rotateX(90deg) rotateY(0deg) translateZ(50px); }
            .face-4 { transform: rotateX(-90deg) rotateY(0deg) translateZ(50px); }
            .face-5 { transform: rotateX(0deg) rotateY(-90deg) translateZ(50px); }
            .face-6 { transform: rotateX(180deg) rotateY(0deg) translateZ(50px); }

            .result-text {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="dice-card">
            <div class="card-glow"></div>
            <h2>骰子</h2>
            <p class="tip">GOOD LUCK</p>
            
            <div class="input-group">
                <label for="totalPoints">总点数（1-6）：</label>
                <input type="number" id="totalPoints" value="6" min="1" max="6">
            </div>
            
            <div class="input-group">
                <label for="winPoints">胜利点数（0-5）：</label>
                <input type="number" id="winPoints" value="3" min="0" max="5">
            </div>

            <div class="dice-wrapper">
                <div class="dice-container">
                    <div class="dice" id="dice">
                        <div class="dice-face face-1">1</div>
                        <div class="dice-face face-2">2</div>
                        <div class="dice-face face-3">3</div>
                        <div class="dice-face face-4">4</div>
                        <div class="dice-face face-5">5</div>
                        <div class="dice-face face-6">6</div>
                    </div>
                </div>
            </div>

            <button class="main-btn" id="rollBtn">开始投掷</button>
            <div class="current-score" id="currentScore">当前点数：-</div>
            <div class="result-text" id="resultText"></div>
        </div>
    </div>

    <script>
        const dice = document.getElementById("dice");
        const rollBtn = document.getElementById("rollBtn");
        const totalPointsInput = document.getElementById("totalPoints");
        const winPointsInput = document.getElementById("winPoints");
        const currentScore = document.getElementById("currentScore");
        const resultText = document.getElementById("resultText");

        // 初始化骰子显示面
        setDiceFace(1);

        rollBtn.addEventListener("click", () => {
            // 验证输入
            const totalPoints = parseInt(totalPointsInput.value);
            const winPoints = parseInt(winPointsInput.value);
            if (isNaN(totalPoints) || totalPoints < 1 || totalPoints > 6) {
                alert("请输入1-6之间的总点数");
                return;
            }
            if (isNaN(winPoints) || winPoints < 0 || winPoints > 5) {
                alert("请输入0-5之间的胜利点数");
                return;
            }

            // 重置状态
            dice.classList.add("rolling");
            resultText.className = "result-text";
            resultText.textContent = "";
            
            // 执行投掷逻辑
            setTimeout(() => {
                const randomPoint = Math.floor(Math.random() * totalPoints) + 1;
                setDiceFace(randomPoint);
                dice.classList.remove("rolling");
                currentScore.textContent = `当前点数：${randomPoint}`;

                // 判断胜负
                if (randomPoint > winPoints) {
                    resultText.textContent = "SUCCESS";
                    resultText.className = "result-text success";
                } else {
                    resultText.textContent = "FAIL";
                    resultText.className = "result-text fail";
                }
            }, 1500);
        });

        // 设置骰子显示面（增加随机Z轴旋转增强3D感）
        function setDiceFace(point) {
            const randomZ = Math.floor(Math.random() * 10) - 5; 
            switch(point) {
                case 1:
                    dice.style.transform = `rotateX(0deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 2:
                    dice.style.transform = `rotateX(0deg) rotateY(-90deg) rotateZ(${randomZ}deg)`;
                    break;
                case 3:
                    dice.style.transform = `rotateX(-90deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 4:
                    dice.style.transform = `rotateX(90deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
                case 5:
                    dice.style.transform = `rotateX(0deg) rotateY(90deg) rotateZ(${randomZ}deg)`;
                    break;
                case 6:
                    dice.style.transform = `rotateX(180deg) rotateY(0deg) rotateZ(${randomZ}deg)`;
                    break;
            }
        }
    </script>
</body>
</html>
